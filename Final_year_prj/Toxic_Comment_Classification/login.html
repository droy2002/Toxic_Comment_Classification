<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Detoxify - LogIn </title>

        <!-- CSS -->
        <link rel="stylesheet" href="login.css">
        <link rel="stylesheet" href="style.css">
                
        <!-- Boxicons CSS -->
        <link href='https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css' rel='stylesheet'>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

        <!-- <style>
            .header a{
                font-style: normal;
            }
        </style> -->

                        
    </head>
    <body>

<!------------------------------ HEADER SECTION ----------------------------------->
    <header class="header">
        <a href="#" class="logo"><img src="logo.png" alt="Logo">
        </a>

        <nav class="navbar">
            <div class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="#about">About</a>
                <a href="#search">Search</a>
                <a href="#feedback">feedback</a>
                <a href="#contact">Contact</a>
                
            </div>
            <div class="bx bx-menu" id="menu-icon"></div>
        </nav>
        
    </header>

<!----------------------------------- LOGIN PAGE ----------------------------------->

        <section class="container forms" style="background-image: linear-gradient(90deg, #b2c7d3, #cfb1bb);">
            <div class="form login">
                <div class="form-content">
                    <header>Login</header>
                    <form action="#">
                        <div class="field input-field">
                            <input type="email" placeholder="Email" class="input">
                        </div>

                        <div class="field input-field">
                            <input type="password" placeholder="Password" class="password">
                            <i class='bx bx-hide eye-icon'></i>
                        </div>

                        <div class="form-link">
                            <a href="#" class="forgot-pass">Forgot password?</a>
                        </div>

                        <div class="field button-field">
                            <button>Login</button>
                        </div>
                    </form>

                    <div class="form-link">
                        <span>Don't have an account? <a href="#" class="link signup-link">Signup</a></span>
                    </div>
                </div>

                <div class="line"></div>

                <!-- <div class="media-options">
                    <a href="#" class="field facebook">
                        <i class='bx bxl-facebook facebook-icon'></i>
                        <span>Login with Facebook</span>
                    </a>
                </div> -->

                <div class="media-options">
                    <a href="#" class="field google">
                        <button> <i class="fab fa-google"></i> &nbsp; Login with Google </button>
                    </a>
                </div>

            </div>

<!-------------------------------------- SIGN UP PAGE ----------------------------------------------->

            <div class="form signup">
                <div class="form-content">
                    <header>Signup</header>
                    <form action="#">
                        <div class="field input-field">
                            <input type="email" placeholder="Email" class="input">
                        </div>

                        <div class="field input-field">
                            <input type="password" placeholder="Create password" class="password">
                        </div>

                        <div class="field input-field">
                            <input type="password" placeholder="Confirm password" class="password">
                            <i class='bx bx-hide eye-icon'></i>
                        </div>

                        <div class="field button-field">
                            <button>Signup</button>
                        </div>
                    </form>

                    <div class="form-link">
                        <span>Already have an account? <a href="#" class="link login-link">Login</a></span>
                    </div>
                </div>

                <div class="line"></div>

                <!-- <div class="media-options">
                    <a href="#" class="field facebook">
                        <i class='bx bxl-facebook facebook-icon'></i>
                        <span>Login with Facebook</span>
                    </a>
                </div> -->

                <div class="media-options">
                    <a href="#" class="field google">
                        <button> <i class="fab fa-google"></i> &nbsp; Login with Google </button>
                    </a>
                </div>

            </div>
        </section>

        <!-- JavaScript -->
        <script src="login.js"></script>
        <script src="script.js"></script>
    </body>
</html>
